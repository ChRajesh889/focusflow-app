<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0F172A;
            color: white;
            margin: 0;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1E293B;
            padding-bottom: 12px;
        }

        .logo-placeholder {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            border-radius: 8px;
        }

        h1 {
            font-size: 18px;
            margin: 0;
            color: #6366F1;
        }

        .status-card {
            background-color: #1E293B;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .status-label {
            font-size: 12px;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-value {
            font-size: 14px;
            font-weight: bold;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10B981;
        }

        .btn {
            width: 100%;
            background-color: #6366F1;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #4F46E5;
        }

        .footer {
            margin-top: 16px;
            font-size: 11px;
            color: #64748B;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo-placeholder"></div>
        <h1>FocusFlow Pro</h1>
    </div>

    <div class="status-card">
        <div class="status-label">Service Status</div>
        <div class="status-value">
            <div id="status-indicator" class="indicator"></div>
            <span id="status-text">Active & Syncing</span>
        </div>
    </div>

    <div class="status-card">
        <div class="status-label">Backend Connection</div>
        <div class="status-value" id="backend-url"
            style="font-size: 11px; word-break: break-all; font-weight: normal; color: #94A3B8;">
            https://focusflow-server-wuud.onrender.com
        </div>
    </div>

    <button id="sync-btn" class="btn">Force Sync Now</button>

    <div class="footer">
        Forceful Tab Blocking Active
    </div>

    <script src="popup.js"></script>
</body>

</html>
